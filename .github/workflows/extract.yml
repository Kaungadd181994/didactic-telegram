name: Extract Any Zip to Root

on:
  push:
    branches:
      - main

jobs:
  extract-and-process:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and extract any zip file
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip file to extract: $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d .
            rm "$ZIP_FILE"
            
            # Safety Check: If the zip contained workflow files that cause push errors,
            # we remove them so the rest of your project commits perfectly.
            if [ -d ".github/workflows" ]; then
              echo "Cleaning up nested workflows inside extraction to prevent push blocks..."
              find .github/workflows/ -type f ! -name "extract.yml" -delete
            fi
          else
            echo "Error: No .zip file found in the root directory!"
            exit 1
          fi

      - name: Commit and Push extracted files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated unzip: Extracted contents to root [skip ci]"
            git push
          else
            echo "No changes detected to commit."
          fi
